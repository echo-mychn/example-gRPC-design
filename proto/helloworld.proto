syntax = "proto3";

package greeter;

service Greeter {
  rpc SayHello (HelloRequest) returns (HelloReply) {}
  rpc SayHelloAgain (HelloRequest) returns (HelloReply) {}
  rpc SayHelloArray (HelloRequest) returns (HelloReplyArray) {}
}

message HelloRequest {
  // structured as data-type, label of variable, numbered field for serialization (how to put the data back together to the right label)
  string name = 1;
}

message HelloReply {
  string message = 1;
}

message HelloReplyArray {
  repeated string letters = 1;
}